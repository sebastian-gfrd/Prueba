services:
  db:
    image: postgres:15
    volumes:
      - ./data/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=arquitectura_db
      - POSTGRES_USER=sebastian
      - POSTGRES_PASSWORD=mi_password_seguro
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn App_Web.wsgi:application --bind 0.0.0.0:8080 --workers 4 --threads 2"
    volumes:
      - .:/App_Web
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://sebastian:mi_password_seguro@db:5432/arquitectura_db
      - DEBUG=True
      - SECRET_KEY=una_llave_muy_larga_y_secreta
    depends_on:
      - db
